<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Agente IA</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="glass-container">
        <form id="discovery-form">
            <div class="form-step active" id="step-1">
                <div class="field-group">
                    <label>Nombre del Negocio</label>
                    <input type="text" id="biz_name" required>
                    <span class="error-msg" id="err-biz_name"></span>
                </div>

                <div class="field-group">
                    <label>¿Cómo supiste de nosotros?</label>
                    <div class="cards-grid" id="origin-grid">
                        <div class="card" onclick="selectCard('origin', 'Facebook', this)">🌐 Facebook</div>
                        <div class="card" onclick="selectCard('origin', 'Instagram', this)">📸 Instagram</div>
                    </div>
                    <span class="error-msg" id="err-origin"></span>
                </div>

                <button type="button" class="neon-button" onclick="nextStep(2)">Continuar</button>
            </div>

            <div class="form-step" id="step-2"></div>

            <div id="success-screen" class="hidden-field" style="display:none; text-align:center;">
                <h2>🚀 ¡Enviado!</h2>
                <a href="https://calendly.com/adolfoarroyoai/30min" class="neon-button">Agendar Cita</a>
            </div>
        </form>
    </div>
    <script src="config.js"></script>
    <script src="logic.js"></script>
</body>
</html>
