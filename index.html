<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Form | Adolfo Arroyo IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="glass-container">
        <div class="progress-container">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <p id="progress-text">Paso 1 de 3</p>
        </div>

        <form id="discovery-form">
            <div class="form-step" id="step-1">
                <h3 class="step-title">1. ¿A qué se dedica tu negocio?</h3>
                <div class="cards-grid" id="rubro-cards">
                    </div>
                <div id="otro-input-container" class="hidden-field">
                    <input type="text" id="rubro_otro" placeholder="Especifica tu rubro aquí...">
                </div>
                
                <div class="input-group">
                    <input type="text" id="biz_name" placeholder="Nombre del Negocio" required>
                    <input type="text" id="contact_name" placeholder="Tu Nombre" required>
                    <input type="tel" id="whatsapp" placeholder="WhatsApp" required>
                </div>
                <button type="button" class="neon-button" onclick="validateStep1()">Continuar</button>
            </div>

            <div id="dynamic-module-container"></div>

            <div id="success-screen" class="hidden-field">
                <h2>🚀 ¡Listo para el siguiente nivel!</h2>
                <p>Hemos recibido tus datos. Ahora, agendemos para definir los detalles técnicos.</p>
                <a href="https://calendly.com/adolfoarroyoai/30min" class="neon-button">Agendar en Calendly</a>
            </div>
        </form>
    </div>
    <script src="config.js"></script>
    <script src="logic.js"></script>
</body>
</html>
