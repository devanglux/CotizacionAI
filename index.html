<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Form | Adolfo Arroyo IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="glass-container">
        <div class="progress-wrapper">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="progress-text">Paso 1 de 5</div>
        </div>

        <form id="discovery-form" novalidate>
            <div class="form-step" id="step-1">
                <h2 class="step-title">1. Identificación y Origen</h2>
                
                <div class="field-group">
                    <label>Nombre del Negocio / Empresa</label>
                    <input type="text" id="biz_name" placeholder="Ej: Restaurante El Faro" required>
                    <span class="error-msg"></span>
                </div>

                <div class="field-group">
                    <label>Nombre del Contacto (Responsable)</label>
                    <input type="text" id="contact_name" placeholder="Ej: Juan Pérez" required>
                    <span class="error-msg"></span>
                </div>

                <div class="field-group">
                    <label>WhatsApp / Teléfono</label>
                    <input type="tel" id="whatsapp" placeholder="+52..." required>
                    <span class="error-msg"></span>
                </div>

                <div class="field-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="email@ejemplo.com" required>
                    <span class="error-msg"></span>
                </div>

                <div class="field-group">
                    <label>¿Quién te refirió? (Opcional)</label>
                    <input type="text" id="referral" placeholder="Vendedor o Cliente">
                </div>

                <div class="field-group">
                    <label>¿Cómo supiste de nosotros?</label>
                    <div class="cards-grid" id="origin-grid">
                        </div>
                    <span class="error-msg" id="origin-error"></span>
                </div>

                <button type="button" class="neon-button" onclick="validateAndNext(2)">Continuar</button>
            </div>

            <div class="form-step" id="step-2" style="display:none;">
                <h2 class="step-title">2. Tu Rubro</h2>
                <div class="field-group">
                    <label>¿A qué se dedica tu negocio?</label>
                    <div class="cards-grid" id="rubro-grid"></div>
                    <span class="error-msg" id="rubro-error"></span>
                </div>
                <div id="otro-container" class="field-group hidden-field">
                    <label>Especifica tu rubro</label>
                    <input type="text" id="rubro_otro" placeholder="Ej: Consultoría de Arte">
                </div>
                <button type="button" class="neon-button" onclick="validateAndNext(3)">Siguiente</button>
            </div>

            <div id="dynamic-step-3"></div>

            <div id="dynamic-step-4"></div>

            <div id="dynamic-step-5"></div>

            <div id="success-screen" class="hidden-field">
                <div class="success-icon">🚀</div>
                <h2>¡Solicitud Recibida!</h2>
                <p>Tu estrategia IA está en camino. Agendemos para definir detalles.</p>
                <a href="https://calendly.com/adolfoarroyoai/30min" target="_blank" class="neon-button">Agendar en Calendly</a>
            </div>
        </form>
    </div>
    <script src="config.js"></script>
    <script src="logic.js"></script>
</body>
</html>
